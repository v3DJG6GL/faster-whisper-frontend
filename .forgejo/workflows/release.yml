# Installer builds: deb + AppImage on Linux, MSI + NSIS on Windows.
#
# Forgejo Actions port of the GitHub workflow — structural changes:
#
#   * Actions unqualified — resolved via DEFAULT_ACTIONS_URL against local
#     pull mirrors; see ci.yml.
#   * windows-latest runs on the self-hosted VM runner (host mode). The job
#     inherits every ci.yml host-mode workaround (manual token checkout,
#     corepack, no setup-node) and builds with `pnpm tauri build` directly —
#     tauri-action resolves paths via $GITHUB_WORKSPACE, which the host-mode
#     runner reports as the container path /github/workspace.
#   * tauri-action is used in build-only mode (empty tagName): its release
#     path talks the GitHub releases API (octokit upload_url flow), which
#     Forgejo's API doesn't implement. Release create / asset upload /
#     publish are plain curl against the Forgejo API instead, using the
#     run-scoped actions token.
#   * `gh release edit` replaced with a curl PATCH (gh is GitHub-only).
#   * permissions: blocks dropped — GitHub token-permission model.
#   * upload-artifact -> local mirror of the Forgejo-maintained fork
#     (github's v4+ refuses non-github.com instances — never reference
#     actions/upload-artifact here, that mirrors the GitHub original).
#
#   - manual run (workflow_dispatch) → pick a version bump (patch/minor/major):
#       the version job bumps package.json + Cargo.toml/lock + tauri.conf.json via
#       scripts/version.mjs, commits "release: vX.Y.Z", tags, pushes, the build job
#       attaches the installers to a draft release, and the publish job flips it
#       live once everything uploaded. Pick "build-only" to just compile installers
#       as run artifacts (no version change, no release).
#   - push a "v*" tag by hand → same path, no version bump.
#
#   Installers are unsigned (no code-signing cert — acceptable for a FOSS tool).
#
#   NOTE: on GitHub, pushes made with the actions token never trigger other
#   workflows. Forgejo is expected to behave the same, but if a duplicate
#   release run ever appears after the version job's tag push, the
#   `concurrency: release` group queues it behind this one and the API steps
#   are idempotent (find-or-create + delete-then-upload), so it converges.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump for this release"
        type: choice
        default: patch
        options: [patch, minor, major, build-only]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Bump + commit + tag (dispatch runs only, unless "build-only").
  version:
    if: github.event_name == 'workflow_dispatch' && inputs.bump != 'build-only'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v7

      # Unlike GitHub-hosted runners, the job image has no preinstalled rust —
      # and `cargo update --workspace` below needs one.
      - uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      - uses: dtolnay/rust-toolchain@stable

      - name: Bump version, commit, tag, push
        id: bump
        run: |
          current="$(node scripts/version.mjs)"
          IFS=. read -r MA MI PA <<< "$current"
          case "${{ inputs.bump }}" in
            major) new="$((MA+1)).0.0" ;;
            minor) new="$MA.$((MI+1)).0" ;;
            patch) new="$MA.$MI.$((PA+1))" ;;
          esac
          echo "bumping $current -> $new"
          node scripts/version.mjs "$new"
          # Sync the workspace member's entry in Cargo.lock (deps stay untouched).
          cargo update --workspace --manifest-path src-tauri/Cargo.toml
          git config user.name "forgejo-actions"
          git config user.email "forgejo-actions@noreply.localhost"
          git commit -am "release: v$new"
          git tag "v$new"
          git push origin "HEAD:$GITHUB_REF_NAME" "v$new"
          echo "tag=v$new" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    # Run when version succeeded OR was skipped (tag push / build-only dispatch).
    if: ${{ !cancelled() && needs.version.result != 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # On a bump run, build the tagged commit (not the pre-bump dispatch ref).
          ref: ${{ needs.version.outputs.tag || github.ref }}

      # The release tag this run builds for — empty means build-only (artifacts).
      - name: Resolve release tag
        id: rel
        run: |
          if [ -n "${{ needs.version.outputs.tag }}" ]; then
            echo "tag=${{ needs.version.outputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v6 # version comes from package.json "packageManager"

      - uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: pnpm

      # ci.yml's list + librsvg/patchelf/xdg-utils, which only the AppImage
      # bundling needs (tauri copies /usr/bin/xdg-open into the AppImage; the
      # act job image doesn't preinstall it like GitHub-hosted runners do).
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            libasound2-dev libxkbcommon-dev librsvg2-dev patchelf xdg-utils

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      # Don't ship a release whose tag disagrees with the in-app version readout.
      - name: Verify the tag matches the app version
        if: steps.rel.outputs.tag != ''
        run: |
          node scripts/version.mjs --check
          app="$(node scripts/version.mjs)"
          tag="${{ steps.rel.outputs.tag }}"
          if [ "$app" != "${tag#v}" ]; then
            echo "::error::tag $tag does not match app version $app — run: pnpm set-version ${tag#v}"
            exit 1
          fi

      # Build-only, always (empty tagName): the release itself is handled via
      # the Forgejo API below — tauri-action's release path is GitHub-only.
      - uses: tauri-apps/tauri-action@v1

      # Draft release + assets via the Forgejo API. Stays a draft until the
      # publish job flips it live, so a half-uploaded release is never visible.
      # Idempotent on re-runs: find-or-create the release, replace same-name
      # assets instead of erroring.
      - name: Create draft release and upload installers
        if: steps.rel.outputs.tag != ''
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          set -euo pipefail
          api="$GITHUB_API_URL"
          hdr="Authorization: token $TOKEN"
          rel=$(curl -sS -H "$hdr" "$api/repos/$REPO/releases/tags/$TAG")
          id=$(jq -r '.id // empty' <<<"$rel")
          if [ -z "$id" ]; then
            id=$(curl -fsS -H "$hdr" -X POST "$api/repos/$REPO/releases" \
              -H 'Content-Type: application/json' \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"draft\":true}" | jq -r '.id')
          fi
          echo "release id: $id"
          shopt -s nullglob
          for f in src-tauri/target/release/bundle/deb/*.deb \
                   src-tauri/target/release/bundle/appimage/*.AppImage; do
            name=$(basename "$f")
            # drop a stale same-name asset from a previous (re-)run
            curl -sS -H "$hdr" "$api/repos/$REPO/releases/$id/assets" \
              | jq -r --arg n "$name" '.[] | select(.name==$n) | .id' \
              | while read -r aid; do
                  curl -fsS -H "$hdr" -X DELETE "$api/repos/$REPO/releases/$id/assets/$aid"
                done
            echo "uploading $name"
            curl -fsS -H "$hdr" -X POST \
              "$api/repos/$REPO/releases/$id/assets?name=$name" \
              -F "attachment=@$f" > /dev/null
          done

      - name: Upload installers as run artifacts (build-only run)
        if: steps.rel.outputs.tag == ''
        uses: https://forgejo.informethic.ch/forgejo/upload-artifact@v4
        with:
          name: installers-linux
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  # Windows installers (MSI + NSIS) on the self-hosted VM runner. Runs in
  # parallel with the Linux build; both upload into the same draft release
  # (find-or-create is race-safe: a lost create just re-reads the winner's
  # release id). Steps mirror ci.yml's windows leg — see the comments there
  # for why checkout is manual, pnpm comes via corepack, and there is no
  # setup-node. WiX + NSIS are fetched by tauri itself on first use (cached
  # in the service profile's %LOCALAPPDATA%\tauri).
  windows:
    needs: version
    if: ${{ !cancelled() && needs.version.result != 'failure' }}
    runs-on: windows-latest
    steps:
      # On a bump run, build the tagged commit (not the pre-bump dispatch ref).
      - name: Checkout
        run: |
          git init -q .
          git remote add origin https://${{ secrets.CI_TOKEN }}@forgejo.informethic.ch/${{ github.repository }}.git
          git -c protocol.version=2 fetch --no-tags --prune --no-recurse-submodules --depth=1 origin ${{ needs.version.outputs.tag || github.ref }}
          git checkout -q --force FETCH_HEAD

      - name: Resolve release tag
        id: rel
        shell: bash
        run: |
          if [ -n "${{ needs.version.outputs.tag }}" ]; then
            echo "tag=${{ needs.version.outputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable pnpm
        run: corepack enable

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Verify the tag matches the app version
        if: steps.rel.outputs.tag != ''
        shell: bash
        run: |
          node scripts/version.mjs --check
          app="$(node scripts/version.mjs)"
          tag="${{ steps.rel.outputs.tag }}"
          if [ "$app" != "${tag#v}" ]; then
            echo "::error::tag $tag does not match app version $app — run: pnpm set-version ${tag#v}"
            exit 1
          fi

      # beforeBuildCommand covers the frontend build; the linux-only bundle
      # targets in tauri.conf.json are skipped automatically on Windows.
      - name: Build installers
        run: pnpm tauri build

      # Same find-or-create + replace-assets flow as the Linux job, but JSON
      # parsing runs on node (already on the VM for JS actions) instead of jq
      # (absent from the VM).
      - name: Upload installers to the release
        if: steps.rel.outputs.tag != ''
        shell: bash
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          set -euo pipefail
          api="$GITHUB_API_URL"
          hdr="Authorization: token $TOKEN"
          id=$(curl -sS -H "$hdr" "$api/repos/$REPO/releases/tags/$TAG" \
            | node -pe 'JSON.parse(require("fs").readFileSync(0,"utf8")).id ?? ""')
          if [ -z "$id" ]; then
            id=$(curl -sS -H "$hdr" -X POST "$api/repos/$REPO/releases" \
              -H 'Content-Type: application/json' \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"draft\":true}" \
              | node -pe 'JSON.parse(require("fs").readFileSync(0,"utf8")).id ?? ""')
          fi
          # empty again = lost the create race to the Linux job — re-read
          if [ -z "$id" ]; then
            id=$(curl -sS -H "$hdr" "$api/repos/$REPO/releases/tags/$TAG" \
              | node -pe 'JSON.parse(require("fs").readFileSync(0,"utf8")).id ?? ""')
          fi
          if [ -z "$id" ]; then
            echo "::error::could not resolve a release id for $TAG"
            exit 1
          fi
          echo "release id: $id"
          shopt -s nullglob
          for f in src-tauri/target/release/bundle/msi/*.msi \
                   src-tauri/target/release/bundle/nsis/*.exe; do
            name=$(basename "$f")
            # drop a stale same-name asset from a previous (re-)run
            curl -sS -H "$hdr" "$api/repos/$REPO/releases/$id/assets" \
              | node -e 'for (const a of JSON.parse(require("fs").readFileSync(0,"utf8"))) if (a.name === process.argv[1]) console.log(a.id)' "$name" \
              | while read -r aid; do
                  curl -fsS -H "$hdr" -X DELETE "$api/repos/$REPO/releases/$id/assets/$aid"
                done
            echo "uploading $name"
            curl -fsS -H "$hdr" -X POST \
              "$api/repos/$REPO/releases/$id/assets?name=$name" \
              -F "attachment=@$f" > /dev/null
          done

      - name: Upload installers as run artifacts (build-only run)
        if: steps.rel.outputs.tag == ''
        uses: https://forgejo.informethic.ch/forgejo/upload-artifact@v4
        with:
          name: installers-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  # Flip the draft live once both builds uploaded everything — gating this in
  # a separate job keeps the release invisible until it is complete.
  publish:
    needs: [version, build, windows]
    if: ${{ !cancelled() && needs.build.result == 'success' && needs.windows.result == 'success' && (needs.version.outputs.tag != '' || startsWith(github.ref, 'refs/tags/')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish the release
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.version.outputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          api="$GITHUB_API_URL"
          hdr="Authorization: token $TOKEN"
          id=$(curl -fsS -H "$hdr" "$api/repos/$REPO/releases/tags/$TAG" | jq -r '.id')
          curl -fsS -H "$hdr" -X PATCH "$api/repos/$REPO/releases/$id" \
            -H 'Content-Type: application/json' -d '{"draft": false}' > /dev/null
