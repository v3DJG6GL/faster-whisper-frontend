# Per-push checks. Forgejo Actions port of the GitHub workflow — changes:
#
#   * Actions are referenced unqualified (owner/repo@ref): the instance sets
#     DEFAULT_ACTIONS_URL to itself, so refs resolve against local pull
#     mirrors (orgs: actions, pnpm, dtolnay, Swatinem) — no GitHub dependency
#     at job start. REQUIRES app.ini [actions] DEFAULT_ACTIONS_URL =
#     https://forgejo.informethic.ch (+ server restart): without it,
#     unqualified refs fall back to code.forgejo.org, which lacks
#     dtolnay/rust-toolchain — this job then dies at the toolchain step. Before bumping any @version, confirm the mirror has
#     synced that tag (8h interval, or "Synchronize now" in repo settings).
#   * windows-latest runs on the self-hosted Windows VM runner (host mode,
#     label windows-latest:host — see the local windows-runner-setup guide).
#     Its job is the MSVC compile check: the Windows-only crates are
#     target-gated, so only a real Windows leg can catch a break there.
#
# Installer builds live in release.yml.
name: ci

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      # Manual checkout. actions/checkout persists credentials via
      # includeIf.gitdir bound to $GITHUB_WORKSPACE — but the host-mode runner
      # reports that as the container path /github/workspace while the clone
      # actually runs at the real host path, so the condition never matches,
      # the auth header is never applied, and git prompts for a username
      # (disabled) → "could not read Username". Cloning directly with the token
      # sidesteps that entirely. CI_TOKEN is a repo secret (read:repository).
      # Plain git only → identical on the bash (Linux) and pwsh (Windows) legs.
      - name: Checkout
        run: |
          git init -q .
          git remote add origin https://${{ secrets.CI_TOKEN }}@forgejo.informethic.ch/${{ github.repository }}.git
          git -c protocol.version=2 fetch --no-tags --prune --no-recurse-submodules --depth=1 origin ${{ github.ref }}
          git checkout -q --force FETCH_HEAD

      - uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      # pnpm via corepack, NOT pnpm/action-setup: the action's self-installer
      # invokes an unquoted node path and cmd splits it on the space in
      # "C:\Program Files\nodejs" ('C:\Program' is not recognized). corepack
      # ships with node and honours the package.json "packageManager" pin, so
      # the version stays single-sourced. (This is also why setup-node runs
      # first and without cache:pnpm — the cache needs pnpm present beforehand,
      # and the corepack shim is tied to setup-node's node.)
      - name: Enable pnpm
        run: corepack enable

      # webkit/gtk for tauri itself; appindicator for the tray; asound for cpal;
      # xkbcommon for the Wayland virtual keyboard.
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            libasound2-dev libxkbcommon-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      # tsc + vite; tauri::generate_context! embeds dist/, so cargo needs this first.
      - run: pnpm build

      # --locked also protects the time-0.3.47 pin (see Cargo.toml) from drifting.
      - name: cargo check
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml

      # The unit tests live mostly in Linux-gated modules; the Windows leg's job
      # is the compile check above.
      - name: cargo test
        if: runner.os == 'Linux'
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml
