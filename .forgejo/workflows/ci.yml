# Per-push checks. Forgejo Actions port of the GitHub workflow — changes:
#
#   * Actions are referenced fully-qualified (https://github.com/...) so
#     resolution never depends on DEFAULT_ACTIONS_URL. An unqualified
#     `actions/checkout@v7` resolves against code.forgejo.org, whose forks
#     use their own version numbers — @v7 doesn't exist there and the job
#     dies instantly at action resolution.
#   * windows-latest leg DROPPED: the self-hosted instance has no Windows
#     runner, so the job queues forever. The "compiles on Windows" guarantee
#     is lost until a Windows runner is registered — the Linux-only crates
#     are target-gated, so only a real Windows leg can catch a break there.
#   * matrix + runner.os gates removed with it (single Linux leg).
#
# Installer builds live in release.yml.
name: ci

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: https://github.com/actions/checkout@v7

      - uses: https://github.com/pnpm/action-setup@v6 # version comes from package.json "packageManager"

      - uses: https://github.com/actions/setup-node@v6
        with:
          node-version: 24.18.0
          # pnpm store cache via the runner's GHA-compatible cache server.
          cache: pnpm

      # webkit/gtk for tauri itself; appindicator for the tray; asound for cpal;
      # xkbcommon for the Wayland virtual keyboard.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            libasound2-dev libxkbcommon-dev

      - uses: https://github.com/dtolnay/rust-toolchain@stable

      - uses: https://github.com/Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      # tsc + vite; tauri::generate_context! embeds dist/, so cargo needs this first.
      - run: pnpm build

      # --locked also protects the time-0.3.47 pin (see Cargo.toml) from drifting.
      - name: cargo check
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml

      - name: cargo test
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml
