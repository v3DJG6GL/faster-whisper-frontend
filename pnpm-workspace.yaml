# pnpm 11 turns "a dependency wanted to run an install script and we ignored it"
# from a warning into a hard error (ERR_PNPM_IGNORED_BUILDS), so every such
# package has to be answered for explicitly or `pnpm install` exits 1.
#
# esbuild (transitive, via vite) is the only one. Its postinstall just resolves
# the platform binary that the @esbuild/* optionalDependencies already provide,
# and CI has been building green on Linux and Windows with this script ignored
# since pnpm 10 started skipping it by default -- so deny it rather than approve
# it, and keep the lifecycle script switched off.
#
# The setting was `onlyBuiltDependencies` (a list) in pnpm 10 and is `allowBuilds`
# (a map) in pnpm 11. pnpm 10 ignores the unknown key, so this file is inert until
# the pnpm 11 bump lands.
allowBuilds:
  esbuild: false

# pnpm 11 also ships a default 1-day `minimumReleaseAge`: `pnpm install
# --frozen-lockfile` hard-rejects any dependency published in the last 24h
# (ERR_PNPM_MINIMUM_RELEASE_AGE_VIOLATION). On CI that turns every bump to a
# same-day release red until it ages out -- vite@8.1.4 hit exactly this. The
# gate is a blunt instrument here: it fires per-install, can't distinguish a
# routine bump from a security fix, and produces a broken build rather than a
# held update. We turn it off so CI is deterministic, and relocate the
# release-age protection to Renovate (.github/renovate.json: minimumReleaseAge
# "3 days"), which holds updates BEFORE the PR/CI exists and can exempt
# security fixes. Renovate is the only path that introduces new versions here,
# so nothing reaches the lockfile without passing that gate first.
minimumReleaseAge: 0
