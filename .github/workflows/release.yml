# Installer builds: deb + AppImage on Linux, MSI + NSIS on Windows.
#
#   - push a "v*" tag        → build both platforms and attach everything to a
#                               DRAFT GitHub release (publish it by hand after a
#                               smoke test — the Windows installers especially
#                               have never been exercised on real hardware)
#   - manual (workflow_dispatch) → build only; installers land as run artifacts
#
# Installers are unsigned (no code-signing cert — acceptable for a FOSS tool;
# Windows will show the SmartScreen warning).
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write # create the draft release + upload assets
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # ci.yml's list + librsvg/patchelf, which only the AppImage bundling needs.
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            libasound2-dev libxkbcommon-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      # Don't ship a release whose tag disagrees with the in-app version readout.
      - name: Verify the tag matches the app version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          node scripts/version.mjs --check
          app="$(node scripts/version.mjs)"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$app" != "$tag" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match app version $app — run: pnpm set-version $tag"
            exit 1
          fi

      # With an empty tagName (manual runs) tauri-action only builds; on a tag it
      # also creates/updates the draft release and attaches the installers.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('faster-whisper-frontend {0}', github.ref_name) || '' }}
          releaseDraft: true

      - name: Upload installers as run artifacts (manual run)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
