# Installer builds: deb + AppImage on Linux, MSI + NSIS on Windows.
#
#   - manual run (workflow_dispatch) → pick a version bump (patch/minor/major):
#       the version job bumps package.json + Cargo.toml/lock + tauri.conf.json via
#       scripts/version.mjs, commits "release: vX.Y.Z", tags, pushes, the build jobs
#       attach the installers to a draft release, and the publish job flips it live
#       once both platforms uploaded. Pick "build-only" to just compile installers
#       as run artifacts (no version change, no release).
#   - push a "v*" tag by hand → same path, no version bump.
#
#   Installers are unsigned (no code-signing cert — acceptable for a FOSS tool;
#   Windows shows SmartScreen).
#
#   NOTE: the version job pushes with GITHUB_TOKEN, which deliberately does NOT
#   trigger other workflows — that's why the build runs in this same workflow run.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump for this release"
        type: choice
        default: patch
        options: [patch, minor, major, build-only]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Bump + commit + tag (dispatch runs only, unless "build-only").
  version:
    if: github.event_name == 'workflow_dispatch' && inputs.bump != 'build-only'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v7

      - name: Bump version, commit, tag, push
        id: bump
        run: |
          current="$(node scripts/version.mjs)"
          IFS=. read -r MA MI PA <<< "$current"
          case "${{ inputs.bump }}" in
            major) new="$((MA+1)).0.0" ;;
            minor) new="$MA.$((MI+1)).0" ;;
            patch) new="$MA.$MI.$((PA+1))" ;;
          esac
          echo "bumping $current -> $new"
          node scripts/version.mjs "$new"
          # Sync the workspace member's entry in Cargo.lock (deps stay untouched).
          cargo update --workspace --manifest-path src-tauri/Cargo.toml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "release: v$new"
          git tag "v$new"
          git push origin "HEAD:$GITHUB_REF_NAME" "v$new"
          echo "tag=v$new" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    # Run when version succeeded OR was skipped (tag push / build-only dispatch).
    if: ${{ !cancelled() && needs.version.result != 'failure' }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write # create the draft release + upload assets
    steps:
      - uses: actions/checkout@v7
        with:
          # On a bump run, build the tagged commit (not the pre-bump dispatch ref).
          ref: ${{ needs.version.outputs.tag || github.ref }}

      # The release tag this run builds for — empty means build-only (artifacts).
      - name: Resolve release tag
        id: rel
        shell: bash
        run: |
          if [ -n "${{ needs.version.outputs.tag }}" ]; then
            echo "tag=${{ needs.version.outputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v6 # version comes from package.json "packageManager"

      - uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: pnpm

      # ci.yml's list + librsvg/patchelf, which only the AppImage bundling needs.
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            libasound2-dev libxkbcommon-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      # Don't ship a release whose tag disagrees with the in-app version readout.
      - name: Verify the tag matches the app version
        if: steps.rel.outputs.tag != ''
        shell: bash
        run: |
          node scripts/version.mjs --check
          app="$(node scripts/version.mjs)"
          tag="${{ steps.rel.outputs.tag }}"
          if [ "$app" != "${tag#v}" ]; then
            echo "::error::tag $tag does not match app version $app — run: pnpm set-version ${tag#v}"
            exit 1
          fi

      # With an empty tagName (build-only) tauri-action only builds; otherwise it
      # also creates/updates the release and attaches the installers. MUST stay a
      # draft here: GITHUB_TOKEN may create draft releases but a direct non-draft
      # create 403s ("Resource not accessible by integration") — and a draft also
      # keeps the release invisible until BOTH platforms uploaded. The publish job
      # below flips it live once everything is attached.
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.rel.outputs.tag }}
          releaseName: ${{ steps.rel.outputs.tag }}
          releaseDraft: true

      - name: Upload installers as run artifacts (build-only run)
        if: steps.rel.outputs.tag == ''
        uses: actions/upload-artifact@v7
        with:
          name: installers-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  # Flip the draft live once BOTH platforms have built and uploaded — editing an
  # existing release is permitted for GITHUB_TOKEN where direct non-draft creation
  # is not, and gating on the full matrix means the release never appears half-filled.
  publish:
    needs: [version, build]
    if: ${{ !cancelled() && needs.build.result == 'success' && (needs.version.outputs.tag != '' || startsWith(github.ref, 'refs/tags/')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version.outputs.tag || github.ref_name }}
        run: gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false
