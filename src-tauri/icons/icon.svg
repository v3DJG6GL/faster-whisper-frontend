<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- The unified app mark: five-bar level meter on the warm-dark Signal tile.
       Same artwork as the Sidebar BrandMark (src/components/Sidebar.tsx) — keep the
       two in sync. Regenerate the set with: pnpm tauri icon src-tauri/icons/icon.svg
       (then delete the unused icons/android + icons/ios output). -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#262019"/>
      <stop offset="1" stop-color="#0e0d0b"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb95e"/>
      <stop offset="1" stop-color="#ff9e2c"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#tile)"/>
  <rect x="10" y="10" width="1004" height="1004" rx="214" fill="none" stroke="#ff9e2c" stroke-opacity="0.12" stroke-width="20"/>
  <g fill="url(#bar)">
    <rect x="152" y="392" width="104" height="240" rx="52"/>
    <rect x="308" y="292" width="104" height="440" rx="52"/>
    <rect x="464" y="192" width="104" height="640" rx="52"/>
    <rect x="620" y="332" width="104" height="360" rx="52"/>
    <rect x="776" y="432" width="104" height="160" rx="52"/>
  </g>
</svg>
